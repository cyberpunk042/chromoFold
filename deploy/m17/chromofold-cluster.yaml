apiVersion: v1
kind: Namespace
metadata:
  name: chromofold
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromofold-router
  namespace: chromofold
spec:
  replicas: 2
  selector:
    matchLabels: {app: chromofold-router}
  template:
    metadata:
      labels: {app: chromofold-router}
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: router
          image: chromofold:dev
          args: ["--role", "router"]
          readinessProbe:
            httpGet: {path: /health/ready, port: 8080}
          livenessProbe:
            httpGet: {path: /health/live, port: 8080}
          resources:
            requests: {cpu: "500m", memory: "512Mi"}
            limits: {cpu: "2", memory: "2Gi"}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chromofold-decode
  namespace: chromofold
spec:
  serviceName: chromofold-decode
  replicas: 2
  selector:
    matchLabels: {app: chromofold-decode}
  template:
    metadata:
      labels: {app: chromofold-decode}
    spec:
      terminationGracePeriodSeconds: 300
      nodeSelector:
        accelerator: nvidia-gpu
      containers:
        - name: decode
          image: chromofold:dev
          args: ["--role", "decode-worker", "--drain-on-sigterm"]
          resources:
            limits:
              nvidia.com/gpu: "1"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chromofold-decode
  namespace: chromofold
spec:
  minAvailable: 1
  selector:
    matchLabels: {app: chromofold-decode}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chromofold-default-deny
  namespace: chromofold
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
