name: RC1 qualification contracts

on:
  pull_request:
    paths:
      - "include/chromofold/rc1_runtime.h"
      - "src/rc1_runtime.cpp"
      - "tests/rc1_runtime_contract.cpp"
      - "tools/chromofold_qualify.py"
      - "integrations/llama.cpp/qualification/rc1-evidence.schema.json"
      - "rc1-qualification.mk"
      - ".github/workflows/rc1-qualification.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make -f rc1-qualification.mk rc1-all
