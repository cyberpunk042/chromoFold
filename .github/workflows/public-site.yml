name: ChromoFold public site

on:
  pull_request:
    paths:
      - "site/**"
      - "product/public-claims.json"
      - "product/downloads.json"
      - "product/evidence-registry.json"
      - "product/release-channel.json"
      - "product/compatibility.json"
      - "product/profiles.json"
      - "product/portal.json"
      - "product/kv-scaling.json"
      - "product/evidence-result.schema.json"
      - "product/qualification-session.schema.json"
      - "examples/evidence/**"
      - "tools/build_public_site.py"
      - "tools/evidence_workbench.py"
      - "tools/qualification_session.py"
      - "tests/test_public_site.py"
      - "tests/test_evidence_workbench.py"
      - "tests/test_qualification_session.py"
      - "site.mk"
      - ".github/workflows/public-site.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - "product/public-claims.json"
      - "product/downloads.json"
      - "product/evidence-registry.json"
      - "product/release-channel.json"
      - "product/compatibility.json"
      - "product/profiles.json"
      - "product/portal.json"
      - "product/kv-scaling.json"
      - "product/evidence-result.schema.json"
      - "product/qualification-session.schema.json"
      - "examples/evidence/**"
      - "tools/build_public_site.py"
      - "tools/evidence_workbench.py"
      - "tools/qualification_session.py"
      - "tests/test_public_site.py"
      - "tests/test_evidence_workbench.py"
      - "tests/test_qualification_session.py"
      - "site.mk"
      - ".github/workflows/public-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test and build product portal
        run: make -f site.mk site-all
      - name: Exercise portable evidence comparison
        run: |
          python3 tools/evidence_workbench.py examples/evidence/baseline.json examples/evidence/candidate.json --output /tmp/evidence-analysis.json --markdown /tmp/evidence-report.md
          grep -q '"state": "PASS"' /tmp/evidence-analysis.json
      - name: Exercise repeated-run qualification session
        run: |
          python3 tools/qualification_session.py examples/evidence/session.json --output /tmp/session-analysis.json --package /tmp/chromofold-support.zip
          grep -q '"state": "PASS"' /tmp/session-analysis.json
          unzip -t /tmp/chromofold-support.zip
      - name: Validate generated routes
        run: |
          test -f dist/site/index.html
          test -f dist/site/technology.html
          test -f dist/site/evidence.html
          test -f dist/site/compatibility.html
          test -f dist/site/start.html
          test -f dist/site/workbench.html
          test -f dist/site/workbench.js
          test -f dist/site/workbench.css
          test -f dist/site/sessions.html
          test -f dist/site/sessions.js
          test -f dist/site/sessions.css
          test -f dist/site/releases.html
          test -f dist/site/contribute.html
          test -f dist/site/sitemap.xml
          grep -q 'chromofold.public-site-data.v6' dist/site/data.js
          grep -q 'kv_scaling' dist/site/data.js
          grep -q 'evidence_result_schema' dist/site/data.js
          grep -q 'qualification_session_schema' dist/site/data.js
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromofold-product-portal-${{ github.sha }}
          path: dist/site
          if-no-files-found: error
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
