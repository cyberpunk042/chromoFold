name: ChromoFold public site

on:
  pull_request:
    paths:
      - "site/**"
      - "product/public-claims.json"
      - "product/downloads.json"
      - "product/evidence-registry.json"
      - "product/release-channel.json"
      - "tools/build_public_site.py"
      - "tests/test_public_site.py"
      - "site.mk"
      - ".github/workflows/public-site.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - "product/public-claims.json"
      - "product/downloads.json"
      - "product/evidence-registry.json"
      - "product/release-channel.json"
      - "tools/build_public_site.py"
      - "tests/test_public_site.py"
      - "site.mk"
      - ".github/workflows/public-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test and build
        run: make -f site.mk site-all
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: chromofold-public-site-${{ github.sha }}
          path: dist/site
          if-no-files-found: error
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
