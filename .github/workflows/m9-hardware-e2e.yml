name: M9 hardware E2E proof

on:
  pull_request:
    paths:
      - 'integrations/llama.cpp/e2e/**'
      - 'm9-hardware-e2e.mk'
      - '.github/workflows/m9-hardware-e2e.yml'
      - '.github/workflows/m9-hardware-e2e-self-hosted.yml'
      - 'docs/m9-hardware-e2e-proof.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check jsonschema pyyaml
      - run: make -f m9-hardware-e2e.mk hardware-proof-check
      - run: make -f m9-hardware-e2e.mk hardware-proof-false-claim
      - name: Verify no model files are committed
        run: |
          if find . -type f \( -name '*.gguf' -o -name '*.ggml' -o -name '*.bin' \) -not -path './.git/*' | grep -q .; then
            echo 'Model or generated binary committed to repository' >&2
            exit 1
          fi
      - name: Verify hardware proof anchors
        run: |
          grep -F 'device_append_calls' integrations/llama.cpp/e2e/evidence-v2.schema.json
          grep -F 'descriptor_publications' integrations/llama.cpp/e2e/evidence-v2.schema.json
          grep -F 'dense_fallback_launches' integrations/llama.cpp/e2e/validate_evidence_v2.py
          grep -F 'compressed_attention_launches' integrations/llama.cpp/e2e/capacity_sweep_v2.py
          grep -F 'compute-sanitizer' .github/workflows/m9-hardware-e2e-self-hosted.yml
      - name: Validate workflow YAML
        run: |
          python - <<'PY'
          import pathlib, yaml
          for path in pathlib.Path('.github/workflows').glob('m9-hardware-e2e*.yml'):
              yaml.safe_load(path.read_text())
              print(path)
          PY
