name: Full test (self-hosted GPU)

# This workflow requires a private runner labelled `self-hosted` and `gpu`.
# Keep it manual-only so pull requests and pushes never queue indefinitely when
# that hardware is offline. Routine PR validation is handled by hosted CPU CI.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    name: Full make test + packaging + bench-smoke
    runs-on: [self-hosted, gpu]
    timeout-minutes: 360
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install jsonschema

      - name: Run unified contract tests (full, including CUDA)
        run: make test

      - name: Packaging library build
        run: make package

      - name: Packaging ABI conformance seams
        run: make conformance

      - name: Build benchmark binaries
        run: make all

      - name: Benchmark smoke
        run: make bench-smoke
