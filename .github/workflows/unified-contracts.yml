name: Unified contracts

on:
  pull_request:
    paths:
      - ".github/workflows/unified-contracts.yml"
      - "tests/**"
      - "Makefile"
      - "*.mk"
      - "include/chromofold/**"
      - "src/**"
      - "integrations/llama.cpp/**/*.schema.json"
      - "integrations/llama.cpp/**/validate_*.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/unified-contracts.yml"
      - "tests/**"
      - "Makefile"
      - "*.mk"
      - "include/chromofold/**"
      - "src/**"
      - "integrations/llama.cpp/**/*.schema.json"
      - "integrations/llama.cpp/**/validate_*.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unified-contracts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: CPU contracts + schemas + evidence validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install --yes --no-install-recommends build-essential

      - name: Run unified contract tests (quick)
        run: make test-quick
